<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e3a5f"/>
  
  <!-- Toolbox (left side) -->
  <g transform="translate(10, 30)">
    <!-- Main box -->
    <rect x="5" y="15" width="30" height="25" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="2"/>
    <!-- Top section -->
    <rect x="7" y="5" width="26" height="12" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="2"/>
    <!-- Handle -->
    <rect x="15" y="0" width="10" height="6" fill="#34495e" rx="2"/>
    <!-- Drawer lines -->
    <line x1="8" y1="22" x2="32" y2="22" stroke="#c0392b" stroke-width="1"/>
    <line x1="8" y1="30" x2="32" y2="30" stroke="#c0392b" stroke-width="1"/>
    <!-- Handle dots -->
    <circle cx="20" cy="27" r="2" fill="#c0392b"/>
    <circle cx="20" cy="35" r="2" fill="#c0392b"/>
  </g>
  
  <!-- Safe (right side) -->
  <g transform="translate(52, 28)">
    <!-- Main body -->
    <rect x="0" y="0" width="35" height="40" fill="#2c3e50" stroke="#1a252f" stroke-width="2" rx="3"/>
    <!-- Door panel -->
    <rect x="4" y="4" width="27" height="32" fill="#34495e" stroke="#1a252f" stroke-width="1" rx="2"/>
    <!-- Combination dial -->
    <circle cx="17" cy="20" r="8" fill="#1a252f" stroke="#95a5a6" stroke-width="2"/>
    <circle cx="17" cy="20" r="4" fill="#7f8c8d"/>
    <!-- Dial marker -->
    <line x1="17" y1="13" x2="17" y2="16" stroke="#ecf0f1" stroke-width="2"/>
    <!-- Handle -->
    <rect x="26" y="15" width="3" height="10" fill="#95a5a6" rx="1"/>
  </g>
  
  <!-- Small T&S text at bottom -->
  <text x="50" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">T&amp;S</text>
</svg>
