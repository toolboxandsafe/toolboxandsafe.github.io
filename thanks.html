<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks! | Toolbox & Safe Moving</title>
    <meta name="description" content="Thank you for contacting Toolbox & Safe Moving. We'll respond to your quote request within a few hours.">
    <link rel="canonical" href="https://toolboxandsafe.com/thanks.html">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            color: white;
        }
        .thanks-content {
            max-width: 600px;
        }
        .thanks-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .thanks-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .thanks-content p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .thanks-content .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #f5a623;
            color: #1e3a5f;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .thanks-content .btn:hover {
            transform: scale(1.05);
        }
        .contact-info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .contact-info a {
            color: #f5a623;
        }
    </style>
</head>
<body>
    <div class="thanks-page">
        <div class="thanks-content">
            <div class="thanks-icon">✅</div>
            <h1>Got It!</h1>
            <p>Thanks for reaching out! I'll review your info and get back to you within a few hours with a quote.</p>
            <p><strong>Need it faster?</strong> Text or call me directly:</p>
            <a href="tel:+16029354209" class="btn">📞 (602) 935-4209</a>
            <div class="contact-info">
                <p>While you wait, check out my work on <a href="https://instagram.com/curlmoving" target="_blank" rel="noopener noreferrer">Instagram @curlmoving</a></p>
            </div>
        </div>
    </div>
</body>
</html>
